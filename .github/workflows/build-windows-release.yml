name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Show Python
        shell: pwsh
        run: |
          python -c "import sys, struct; print(sys.executable); print(sys.version); print(struct.calcsize('P') * 8)"

      - name: Install requirements
        shell: pwsh
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m unittest discover -s tests -p "test*.py" -v

  package:
    name: Package Windows x64
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Show Python
        shell: pwsh
        run: |
          python -c "import sys, struct; print(sys.executable); print(sys.version); print(struct.calcsize('P') * 8)"

      - name: Build release package
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $pythonPath = python -c "import sys; print(sys.executable)"
          .\build.ps1 -Configuration Release -PythonPath $pythonPath

      - name: Verify package layout
        shell: pwsh
        run: |
          $exe = "dist\RacingTelemetry\RacingTelemetry.exe"
          $zip = "release\RacingTelemetry-Windows-x64.zip"
          if (-not (Test-Path -LiteralPath $exe -PathType Leaf)) {
            throw "Missing packaged executable: $exe"
          }
          if (-not (Test-Path -LiteralPath "dist\RacingTelemetry\_internal" -PathType Container)) {
            throw "Missing PyInstaller _internal directory."
          }
          if (-not (Test-Path -LiteralPath $zip -PathType Leaf)) {
            throw "Missing release ZIP: $zip"
          }
          Get-FileHash -LiteralPath $zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  RacingTelemetry-Windows-x64.zip" } |
            Set-Content -LiteralPath "release\RacingTelemetry-Windows-x64.zip.sha256" -Encoding ASCII

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: RacingTelemetry-Windows-x64
          path: |
            release/RacingTelemetry-Windows-x64.zip
            release/RacingTelemetry-Windows-x64.zip.sha256
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "release\RacingTelemetry-Windows-x64.zip"
          $sha = "release\RacingTelemetry-Windows-x64.zip.sha256"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Windows x64 release package."
          }
          gh release upload $tag $zip $sha --clobber
